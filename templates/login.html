<!DOCTYPE html>
<html>
<head>
    <title>Security Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #ecf0f1; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 350px; padding: 30px; border-radius: 15px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-primary { background: #2c3e50; border: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">Audit Access</h3>
        <form method="POST">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login to Dashboard</button>
        </form>
    </div>
</body>
</html>
